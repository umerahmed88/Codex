# ============================================================================
# EAS Build & Submit
#   - Merge to main  → build a PREVIEW and distribute to internal testers.
#   - Push a v* tag  → build PRODUCTION and submit to the stores.
#
# Requires an EXPO_TOKEN secret (Expo access token) in the repo settings.
# Store credentials are managed by EAS (eas credentials) + eas.json secrets,
# never committed.
# ============================================================================
name: EAS Build

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: arabic-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Merge to main → internal preview build for testers.
      - name: Build preview (on main)
        if: github.ref == 'refs/heads/main'
        run: eas build --profile preview --platform all --non-interactive --no-wait

      # Tagged release (vX.Y.Z) → production build + store submission.
      - name: Build & submit production (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: eas build --profile production --platform all --non-interactive --no-wait --auto-submit
